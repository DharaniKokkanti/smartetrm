spring:
  application:
    name: etrm-backend

  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ETRM_DB;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:etrm_app}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    # ddl-auto: validate, NOT update/create — the schema is owned by the SQL
    # scripts (Flyway migrations below), never by Hibernate. JPA entities
    # must match the real schema; if they drift, validation fails loudly at
    # startup instead of Hibernate silently "fixing" the schema.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.etrm: INFO
    org.hibernate.SQL: WARN

etrm:
  jwt:
    # Auth scaffolding only — full permission model deferred per the Master
    # Data Entry Technical Design doc, Section 6. This secret MUST be
    # overridden via env var in any real deployment.
    secret: ${JWT_SECRET:dev-only-secret-replace-me-before-any-real-deployment-CHANGE_THIS}
    expiry-minutes: 480
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
